version: '3.8'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  lint:
    build: .
    volumes:
      - .:/app
    working_dir: /app
    command: bash -c "black . && pylint --load-plugins pylint_django communications/ core/ dashboard/ MiniF/ profiles/ projects/ users/"

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=miniF_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=585662vcxz
    ports:
      - "5432:5432"
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data: