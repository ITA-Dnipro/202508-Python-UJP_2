version: '3.8'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  test:
      build: .
      volumes:
        - .:/app
      working_dir: /app
      environment:
        DJANGO_SETTINGS_MODULE: MiniF.settings   
      command: >
        bash -lc "
          coverage run manage.py test &&
          coverage report -m
        "

  lint:
    build: .
    volumes:
      - .:/app
    environment:
    - DJANGO_SETTINGS_MODULE=MiniF.settings
    - PYTHONPATH=/app
    working_dir: /app
    command: >
      bash -c "
        BLACK_EXIT=0 &&
        black --check . || BLACK_EXIT=$$? &&
        PYLINT_EXIT=0 &&
        pylint --load-plugins=pylint_django --rcfile=./.pylintrc communications/ core/ dashboard/ MiniF/ profiles/ projects/ users/ || PYLINT_EXIT=$$? &&
        exit $$(($$BLACK_EXIT + $$PYLINT_EXIT))
      "
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=miniF_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=585662vcxz
    ports:
      - "5432:5432"
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: 585662vcxz
    volumes:
      - mongodb_data:/data/db
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  es_data: