<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-container { max-width: 400px; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        input, button { width: 100%; margin: 10px 0; padding: 10px; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Login to Chat</h2>
        <form id="loginForm">
            <input type="text" id="token" placeholder="Enter JWT Token" required>
            <input type="text" id="username" placeholder="Enter Your Username" required>
            <button type="submit">Login</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = document.getElementById('token').value;
            const username = document.getElementById('username').value;

            const response = await fetch('http://127.0.0.1:8000/chat/api/conversations/', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username: username }),
            });

            const data = await response.json();
            const messageDiv = document.getElementById('message');

            if (response.ok) {
                // Redirect to chat with the room ID
                window.location.href = `chat.html?roomId=${data.id}&token=${token}&username=${username}`;
            } else {
                messageDiv.innerText = `Error: ${data.error || 'Failed to login'}`;
                messageDiv.style.color = 'red';
            }
        });
    </script>
</body>
</html>
