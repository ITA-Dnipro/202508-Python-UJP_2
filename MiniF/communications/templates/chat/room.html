<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #chatBox { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        #messageInput { width: 70%; padding: 10px; }
        #sendButton { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        #sendButton:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <h2>Chat Room</h2>
    <div id="chatBox"></div>
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button id="sendButton">Send</button>
    <div id="status"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const roomId = params.get('roomId');
        const token = params.get('token');
        const username = params.get('username');

        const chatBox = document.getElementById('chatBox');
        const status = document.getElementById('status');

        if (!roomId || !token || !username) {
            status.innerText = 'Invalid session. Please login again.';
            status.style.color = 'red';
            setTimeout(() => window.location.href = 'index.html', 2000);
            throw new Error('Missing parameters');
        }

        // --- Fetch existing messages (через Krakend) ---
        async function loadMessages() {
            try {
                const response = await fetch(`http://127.0.0.1:8080/chat/api/conversations/${roomId}/messages/`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (response.ok) {
                    data.forEach(msg => {
                        const msgDiv = document.createElement('div');
                        msgDiv.textContent = `${msg.sender_username}: ${msg.content}`;
                        chatBox.appendChild(msgDiv);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                } else {
                    status.innerText = 'Failed to load messages';
                    status.style.color = 'red';
                }
            } catch {
                status.innerText = 'Network error loading messages.';
                status.style.color = 'red';
            }
        }

        loadMessages();

        // --- WebSocket connection (напряму) ---
        const ws = new WebSocket(`ws://127.0.0.1:8000/ws/chat/${roomId}/?token=${token}`);

        ws.onopen = () => {
            status.innerText = 'Connected!';
            status.style.color = 'green';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const msgDiv = document.createElement('div');
            msgDiv.textContent = `${data.sender}: ${data.message}`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        ws.onerror = () => {
            status.innerText = 'WebSocket error';
            status.style.color = 'red';
        };

        ws.onclose = () => {
            status.innerText = 'Disconnected';
            status.style.color = 'red';
        };

        // --- Send message ---
        document.getElementById('sendButton').addEventListener('click', async () => {
            const message = document.getElementById('messageInput').value.trim();
            if (!message) return;

            // Надсилаємо через WebSocket
            ws.send(JSON.stringify({ message }));

            // І зберігаємо у БД через Krakend
            await fetch(`http://127.0.0.1:8080/chat/api/messages/`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ room: roomId, content: message })
            });

            document.getElementById('messageInput').value = '';
        });

        // Enter = send
        document.getElementById('messageInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') document.getElementById('sendButton').click();
        });
    </script>
</body>
</html>
