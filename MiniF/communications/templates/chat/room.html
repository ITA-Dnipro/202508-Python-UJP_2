<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #chatBox { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        #messageInput { width: 70%; padding: 10px; }
        #sendButton { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        #sendButton:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div id="chatBox"></div>
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button id="sendButton">Send</button>
    <div id="status"></div>

    <script>
        // Get query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('roomId');
        const token = urlParams.get('token');
        const username = urlParams.get('username');

        if (!roomId || !token || !username) {
            document.getElementById('status').innerText = 'Invalid session. Please login again.';
            document.getElementById('status').style.color = 'red';
            setTimeout(() => window.location.href = 'index.html', 2000);
            throw new Error('Missing parameters');
        }

        // WebSocket connection
        const ws = new WebSocket(`ws://127.0.0.1:8000/ws/chat/${roomId}/?token=${token}`);

        ws.onopen = () => {
            document.getElementById('status').innerText = 'Connected to chat!';
            document.getElementById('status').style.color = 'green';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.innerText = `${data.sender}: ${data.message}`;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to latest
        };

        ws.onerror = (error) => {
            document.getElementById('status').innerText = 'WebSocket error: ' + error;
            document.getElementById('status').style.color = 'red';
        };

        ws.onclose = () => {
            document.getElementById('status').innerText = 'Disconnected from chat.';
            document.getElementById('status').style.color = 'red';
        };

        document.getElementById('sendButton').addEventListener('click', () => {
            const message = document.getElementById('messageInput').value;
            if (message) {
                ws.send(JSON.stringify({ message: message }));
                document.getElementById('messageInput').value = '';
            }
        });

        // Allow sending with Enter key
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('sendButton').click();
            }
        });
    </script>
</body>
</html>
