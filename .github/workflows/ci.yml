name: Django CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('MiniF/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint pylint-django black
          if [ -f MiniF/requirements.txt ]; then pip install -r MiniF/requirements.txt; fi

      - name: Check code formatting with Black
        run: black MiniF/

      - name: Run Pylint
        run: |
          export PYTHONPATH=$(pwd)
          pylint --load-plugins pylint_django --rcfile=MiniF/.pylintrc MiniF/ communications/ core/ dashboard/ profiles/ projects/ users/

      - name: Enforce pylint score
        run: |
          export PYTHONPATH=$(pwd)
          score=$(pylint --rcfile=MiniF/.pylintrc MiniF/ | grep "Your code has been rated at" | awk '{print $7}' | cut -d/ -f1)
          echo "Pylint score: $score"
          if [ "$score" -lt 8 ]; then
            echo "Pylint score is below 8. Failing build."
            exit 1
          fi
