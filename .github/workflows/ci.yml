name: Django CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DJANGO_SETTINGS_MODULE: MiniF.settings

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('MiniF/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f MiniF/requirements.txt ]; then pip install -r MiniF/requirements.txt; fi

      - name: Change to MiniF directory and run linting
        run: |
          cd MiniF
          export PYTHONPATH=$(pwd)
          export DJANGO_SETTINGS_MODULE=MiniF.settings
          
          # Перевірка форматування з Black
          black .
          
          # Запуск Pylint тільки для директорій з Python файлами
          find . -name "*.py" -path "./communications/*" -o -path "./core/*" -o -path "./dashboard/*" -o -path "./profiles/*" -o -path "./projects/*" -o -path "./users/*" | head -1 > /dev/null && \
          pylint --load-plugins=pylint_django \
                 --rcfile=.pylintrc \
                 --ignore=migrations \
                 communications/ core/ dashboard/ profiles/ projects/ users/ || echo "No Python files found to lint"
