name: Django CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DJANGO_SETTINGS_MODULE: MiniF.settings
      PYTHONPATH: ${{ github.workspace }}/MiniF

      TIME_ZONE: ${{ secrets.TIME_ZONE }}
      LANGUAGE_CODE: ${{ secrets.LANGUAGE_CODE }}
      EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
      EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
      DEFAULT_FROM_EMAIL: ${{ secrets.DEFAULT_FROM_EMAIL }}
      
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MONGO_URI: ${{ secrets.MONGO_URI }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('MiniF/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f MiniF/requirements.txt ]; then pip install -r MiniF/requirements.txt; fi

      - name: Check code formatting with Black
        run: black MiniF/

      - name: Run Pylint
        run: |
          export PYTHONPATH=$(pwd)/MiniF
          pylint --load-plugins pylint_django --rcfile=MiniF/.pylintrc MiniF/communications MiniF/core MiniF/dashboard MiniF/profiles MiniF/projects MiniF/users
 
  test:
      runs-on: ubuntu-latest
      needs: lint

      services:
        postgres:
          image: postgres:15
          env:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: test_db
          ports:
            - 5432:5432
          options: >-
            --health-cmd="pg_isready -U postgres"
            --health-interval=10s
            --health-timeout=5s
            --health-retries=5
        mongo:
          image: mongo:6
          ports:
            - 27017:27017
          options: >-
            --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })' || mongo --eval 'db.runCommand({ ping: 1 })'"
            --health-interval=10s
            --health-timeout=5s
            --health-retries=5


        elasticsearch: 
          image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
          env:
            discovery.type: single-node
            xpack.security.enabled: false
            ES_JAVA_OPTS: -Xms512m -Xmx512m
          ports:
            - 9200:9200
          options: >-
            --health-cmd="curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow"
            --health-interval=10s
            --health-timeout=5s
            --health-retries=10


      env:
        SECRET_KEY: ${{ secrets.SECRET_KEY }}
        DJANGO_SETTINGS_MODULE: MiniF.settings
        PYTHONPATH: ${{ github.workspace }}/MiniF
        
        DATABASE_URL: ${{ secrets.DATABASE_URL_CI }}
        MONGO_URI: ${{ secrets.MONGO_URI_CI }}
        
        TIME_ZONE: ${{ secrets.TIME_ZONE }}
        LANGUAGE_CODE: ${{ secrets.LANGUAGE_CODE }}
        EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
        EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
        DEFAULT_FROM_EMAIL: ${{ secrets.DEFAULT_FROM_EMAIL }}
        ELASTICSEARCH_URL: http://localhost:9200

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v4
          with:
            python-version: "3.10"

        - name: Cache pip dependencies
          uses: actions/cache@v3
          with:
            path: ~/.cache/pip
            key: ${{ runner.os }}-pip-${{ hashFiles('MiniF/requirements.txt') }}
            restore-keys: |
              ${{ runner.os }}-pip-

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r MiniF/requirements.txt

        - name: Run Django system checks
          working-directory: MiniF
          run: python manage.py check

        - name: Run migrations
          working-directory: MiniF
          run: python manage.py migrate --noinput

        - name: Run all tests with coverage
          working-directory: MiniF
          run: |
            coverage run --source='.' manage.py test --verbosity=2
            coverage report
            coverage xml

            
        - name: Upload coverage reports to Codecov
          uses: codecov/codecov-action@v5
          with:
            token: ${{ secrets.CODECOV_TOKEN }}
            slug: ITA-Dnipro/202508-Python-UJP_2

