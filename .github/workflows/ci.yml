name: Django CI Pipeline

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint

    - name: Run Black
      run: black .
        
    - name: Run Pylint
      run: |
        pylint --load-plugins pylint_django \
            communications/ core/ dashboard/ MiniF/ profiles/ projects/ users/
    - name: Analysing the code with pylint
      run: |
        pylint $(git ls-files '*.py')


jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: ["3.10"]

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('MiniF/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MiniF/requirements.txt

      - name: Run Pylint
        run: |
          export PYTHONPATH=$(pwd)
          score=$(pylint --rcfile=MiniF/.pylintrc MiniF/ | grep "Your code has been rated at" | awk '{print $7}' | cut -d/ -f1)

      - name: Check code formatting with Black
        run: black MiniF/





